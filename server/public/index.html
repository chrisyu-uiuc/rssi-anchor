<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indoor Positioning System</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1>Indoor Positioning System</h1>
      <span class="status-dot" id="serverStatus"></span>
      <span class="status-text" id="serverStatusText">Connecting...</span>
    </div>
    <div class="header-right">
      <div class="mode-toggle">
        <button class="mode-btn active" id="btnTraining" data-mode="TRAINING">Training</button>
        <button class="mode-btn" id="btnLocalization" data-mode="LOCALIZATION">Localization</button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <div class="main-layout">
    <!-- Left: Grid visualization -->
    <div class="panel grid-panel">
      <div class="panel-header">
        <h2>Floor Grid <span id="gridInfo" class="subtitle">490 x 490 cm</span></h2>
      </div>
      <div class="canvas-container">
        <canvas id="gridCanvas"></canvas>
      </div>
      <div class="grid-legend">
        <span class="legend-item"><span class="dot dot-anchor"></span> Anchor</span>
        <span class="legend-item"><span class="dot dot-collected"></span> Collected</span>
        <span class="legend-item"><span class="dot dot-pending"></span> Pending</span>
        <span class="legend-item"><span class="dot dot-current"></span> Current</span>
        <span class="legend-item"><span class="dot dot-position"></span> Position</span>
      </div>
    </div>

    <!-- Right: Controls + Status -->
    <div class="panel-stack">
      <!-- Anchor Status -->
      <div class="panel anchor-panel">
        <div class="panel-header">
          <h2>Anchors <span class="subtitle" id="anchorCount">0/6 connected</span></h2>
        </div>
        <div class="anchor-grid" id="anchorGrid"></div>
      </div>

      <!-- Training Controls (shown in TRAINING mode) -->
      <div class="panel training-panel" id="trainingPanel">
        <div class="panel-header">
          <h2>Training <span class="subtitle" id="trainingProgress">0/64 points</span></h2>
        </div>
        <div class="training-controls">
          <div class="coord-display">
            <label>Selected Point:</label>
            <span id="selectedPoint">None</span>
          </div>
          <div class="btn-row">
            <button class="btn btn-collect" id="btnCollect" disabled>Collect</button>
            <button class="btn btn-cancel" id="btnCancel" style="display:none">Cancel</button>
            <button class="btn btn-delete" id="btnDelete" disabled>Delete</button>
          </div>
          <div class="progress-container" id="progressContainer" style="display:none">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">0%</span>
          </div>
          <div class="training-options">
            <label class="checkbox-label">
              <input type="checkbox" id="autoAdvance" checked>
              Auto-advance to next point
            </label>
          </div>
        </div>
      </div>

      <!-- Localization Info (shown in LOCALIZATION mode) -->
      <div class="panel localization-panel" id="localizationPanel" style="display:none">
        <div class="panel-header">
          <h2>Localization</h2>
        </div>
        <div class="localization-info">
          <div class="position-readout">
            <label>Predicted Position:</label>
            <span id="predictedPosition" class="position-value">--</span>
          </div>
          <div class="position-readout">
            <label>Confidence:</label>
            <span id="confidenceValue" class="confidence-value">--</span>
          </div>
          <div class="position-readout">
            <label>Update Rate:</label>
            <span id="updateRate">-- Hz</span>
          </div>
          <div class="knn-params">
            <label>K: <input type="number" id="knnK" value="3" min="1" max="20" class="param-input"></label>
            <label>Sigma: <input type="number" id="knnSigma" value="1.0" min="0.1" max="10" step="0.1" class="param-input"></label>
            <button class="btn btn-small" id="btnUpdateKnn">Update</button>
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="showTrail" checked>
            Show position trail
          </label>
        </div>
      </div>

      <!-- RSSI Monitor -->
      <div class="panel rssi-panel">
        <div class="panel-header">
          <h2>Live RSSI</h2>
        </div>
        <div class="rssi-bars" id="rssiBars"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/grid-canvas.js"></script>
  <script src="/js/training-panel.js"></script>
  <script src="/js/rssi-monitor.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
